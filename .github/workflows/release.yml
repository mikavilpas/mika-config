---
name: Release
on:
  push:
    branches:
      - main

# Never run two releases against the same branch at once (avoids double publishes)
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # npm OIDC trusted publishing (no NPM_TOKEN needed)
    steps:
      - name: Mint a release-bot installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write # push the Version PR branch, tags, and GitHub releases
          permission-pull-requests: write # open/update the "Version Packages" PR
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true # changesets pushes the Version PR branch with this token
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          registry-url: https://registry.npmjs.org
      - run: pnpm install
      - run: pnpm build # generate the dist files for the release
      - name: Create Version PR or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          # Keep the automation's own commit + PR conventional-commits compliant
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Enable auto-merge on the Version PR
        # Since this is a small personal project, automerge releases so that
        # everything will release automatically as soon as possible. This still
        # requires the checks to pass so that any failures (e.g. formatting
        # related) complain up front.
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          STEPS_CHANGESETS_OUTPUTS_PULLREQUESTNUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: >
          gh pr merge "${STEPS_CHANGESETS_OUTPUTS_PULLREQUESTNUMBER}" --auto --squash --repo "${{ github.repository }}"

      - name: Tag and release the private root package
        # The root @mikavilpas/mika-config is private, so `changeset publish`
        # does not touch it beyond bumping the package.json version. Craete a
        # tag and github release so that I can track all the changes manually
        # in the same github releases view.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          version="$(jq --raw-output .version package.json)"
          tag="v${version}"
          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists, nothing to release."
            exit 0
          fi
          cliff_version="$(yq --input-format toml --output-format yaml '.tools.git-cliff' mise.toml)"
          notes="$(npx --yes "git-cliff@${cliff_version}" --tag-pattern '^v[0-9]' --unreleased --tag "${tag}" --strip all)"
          git tag "${tag}"
          git push origin "${tag}"
          if [ -z "$(printf '%s' "${notes}" | tr -d '[:space:]')" ]; then
            gh release create "${tag}" --title "${tag}" --generate-notes
          else
            printf '%s\n' "${notes}" | gh release create "${tag}" --title "${tag}" --notes-file -
          fi
